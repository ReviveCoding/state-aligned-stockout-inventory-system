<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="438"
 viewBox="0 0 1200 438" role="img" aria-labelledby="title desc">
<title id="title">M5 series-disjoint confirmation scorecard</title>
<desc id="desc">M5 series-disjoint confirmation scorecard. Generated from committed M5 confirmation metrics.</desc>
<rect width="100%" height="100%" fill="#FFFFFF"/>
