text{font-family:Arial,Helvetica,sans-serif}
.title{font-size:31px;font-weight:700;fill:#0F172A}
.subtitle{font-size:17px;fill:#475569}
.label{font-size:16px;font-weight:700;fill:#334155}
.small{font-size:14px;fill:#475569}
.value{font-size:37px;font-weight:700;fill:#0F172A}
.note{font-size:13px;fill:#64748B}
</style>
