seed: 42
run_name: m5_expanded_v1

data:
  source: m5
  m5_zip_path: /mnt/data/m5-forecasting-accuracy.zip
  n_series: 240
  history_days: 224
  controlled_stockout_rate: 0.12
  allow_fallback: false

model:
  horizon: 14
  quantiles: [0.1, 0.5, 0.9]
  max_train_rows: 60000
  max_iter: 80
  validation_horizon: 14
  decision_cost_tolerance: 0.05
  router_max_wape_regression: 0.10

inventory:
  holding_cost: 1.0
  shortage_cost: 5.0
  order_cost: 0.1
  lead_time_days: 2
  review_period_days: 1
  service_level: 0.80
  initial_inventory_multiplier: 1.0

release_gate:
  max_quantile_crossing: 0
  max_negative_forecasts: 0
  max_hierarchy_error: 1.0e-8
  min_candidate_wape_improvement: -0.02
  min_cost_win_rate: 0.50
  max_candidate_cost_regression: 0.05
  max_candidate_fill_rate_degradation: 0.01
  max_worst_slice_wape_regression: 0.20
  min_forecast_slice_win_rate: 0.35
  max_repeat_stockout_ratio: 0.75
  max_truth_coverage_error: 0

closed_loop_cycles: 16
lifecycle_series: 120

output_dir: reports/m5_expanded_v1
artifact_dir: artifacts/m5_expanded_v1
